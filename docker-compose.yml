services:
  openclaw:
    # Build from the Dockerfile in this directory
    build: .
    # Container name for easy 'docker exec' commands
    container_name: openclaw-agent
    ports:
      # Gateway API & Dashboard UI port
      - "18789:18789"
    volumes:
      # Mount local claw-data folder to OpenClaw's root config directory inside the container
      # This exposes your workspace, making it behave like the official cloned repository structure
      - ./claw-data:/root/.openclaw
    # Auto-restart the container unless you manually stop it
    restart: unless-stopped
